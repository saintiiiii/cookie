{% extends "base.html" %}
{% block title %}Password Updated | Sweet Crumbs Bakery{% endblock %}
{% block auth_content %}
<section class="login-panel">
    <div class="login-copy">
        <div class="brand-pill">Account Recovery</div>
        <h1>Password updated</h1>
        <p>Your account password has been changed.</p>
    </div>
    <div class="login-card">
        <h2 class="mb-3">Ready to Sign In</h2>
        <a href="{% url 'login' %}" class="btn btn-primary w-100">Login</a>
    </div>
</section>
{% endblock %}
